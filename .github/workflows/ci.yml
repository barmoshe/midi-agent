name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install core deps (never the optional engine extras)
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Run the offline test suite
        run: python -m pytest -q

  m4l-port:
    # Guards the Max for Live JS port: engine.js must match the committed golden vectors
    # (dumped from Python) bit-for-bit, and the device glue must pass its smoke test.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Verify the JS engine matches the Python golden vectors
        run: node m4l/test/run.js
      - name: Smoke-test the device glue
        run: node m4l/test/sim_device.js
